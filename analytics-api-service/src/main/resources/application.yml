spring:
  application:
    name: analytics-api-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/streamflow
    username: streamflow
    password: streamflow123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: AnalyticsHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

streamflow:
  redis:
    keys:
      product-metrics-prefix: "metrics:product:"
      leaderboard-clicks: "leaderboard:clicks:5min"
      active-users: "active_users:current"
      window-prefix: "metrics:window:"
  api:
    default-page-size: 20
    max-page-size: 100

logging:
  level:
    com.streamflow: DEBUG
    org.springframework.data: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:5432/streamflow

  data:
    redis:
      host: ${REDIS_HOST:redis}

logging:
  level:
    com.streamflow: INFO
